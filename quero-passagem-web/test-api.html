<!DOCTYPE html>
<html>
<head><title>Test API</title></head>
<body>
    <div id="result">Testing...</div>
    <script>
        async function fetchDates() {
            const resultDiv = document.getElementById('result');
            let found = [];
            // Let's test from March 18 to April 10
            for (let i = 18; i <= 30; i++) {
                try {
                    let d = "2026-03-" + (i < 10 ? "0" + i : i);
                    let res = await fetch("https://queropassagem.qpdevs.com/ws_v4/new/search", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": "Basic " + btoa("wiltter:JQEGPFPx")
                        },
                        body: JSON.stringify({
                            from: "ROD_1546", // SP
                            to: "CIT_53",     // PR
                            travelDate: d,
                            "include-connections": false
                        })
                    });
                    let data = await res.json();
                    if (data && data.length > 0) {
                        found.push(d + " (" + data.length + " tickets)");
                        break; // Stop when we find one!
                    }
                } catch(e) {
                    console.error(e);
                }
            }
            if(found.length === 0) {
                // Try April
                for (let i = 1; i <= 10; i++) {
                    try {
                        let d = "2026-04-" + (i < 10 ? "0" + i : i);
                        let res = await fetch("https://queropassagem.qpdevs.com/ws_v4/new/search", {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization": "Basic " + btoa("wiltter:JQEGPFPx")
                            },
                            body: JSON.stringify({
                                from: "ROD_1546",
                                to: "CIT_53",
                                travelDate: d,
                                "include-connections": false
                            })
                        });
                        let data = await res.json();
                        if (data && data.length > 0) {
                            found.push(d + " (" + data.length + " tickets)");
                            break;
                        }
                    } catch(e) {}
                }
            }
            resultDiv.innerText = found.length > 0 ? "Valid dates: " + found.join(", ") : "No valid dates found in range";
        }
        fetchDates();
    </script>
</body>
</html>
